<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Warm Gold-Amber Metallic Gradient -->
    <linearGradient id="brandGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1C1"/>
      <stop offset="35%" stop-color="#E2BA49"/>
      <stop offset="70%" stop-color="#B8871B"/>
      <stop offset="100%" stop-color="#805603"/>
    </linearGradient>

    <filter id="symbolGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g filter="url(#symbolGlow)">
    <!-- Stylized Duality Crescent & Ring -->
    <path d="M 50 12 A 36 36 0 1 0 86 48 A 28 28 0 1 1 50 12 Z" fill="url(#brandGold)"/>
    
    <!-- Central Sparkle Star Accent -->
    <path d="M 68 32 Q 68 22 78 22 Q 68 22 68 12 Q 68 22 58 22 Q 68 22 68 32 Z" fill="url(#brandGold)"/>
  </g>
</svg>
