<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caliptra — Nocturne Aura (Official Smart Link)</title>
    <meta name="description" content="Listen to Nocturne Aura by Caliptra on Spotify, Apple Music, YouTube Music, Bandcamp, and Amazon Music." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" crossorigin href="./assets/style-CtOTVYiv.css">
  </head>
  <body class="smartlink-page">
    <div class="smartlink-bg" style="background-image: url('album_nocturne_aura_1782884878535.jpg');"></div>
    <div class="smartlink-overlay"></div>

    <main class="smartlink-card">
      <a href="/" class="smartlink-back-link"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Official Site</a>
      
      <div class="smartlink-cover-wrap">
        <img src="./album_nocturne_aura_1782884878535.jpg" alt="Nocturne Aura Album Cover" class="smartlink-cover" />
      </div>

      <h1 class="smartlink-title font-serif">Nocturne Aura</h1>
      <p class="smartlink-artist">Caliptra</p>
      <span class="smartlink-tag">EP Release</span>

      <div class="platform-list">
        <a href="https://spotify.com" target="_blank" rel="noopener" class="platform-row">
          <div class="platform-info">
            <i data-lucide="music" class="platform-icon"></i>
            <span>Spotify</span>
          </div>
          <span class="btn btn-primary platform-btn">Play</span>
        </a>

        <a href="https://apple.com" target="_blank" rel="noopener" class="platform-row">
          <div class="platform-info">
            <i data-lucide="disc" class="platform-icon"></i>
            <span>Apple Music</span>
          </div>
          <span class="btn btn-primary platform-btn">Listen</span>
        </a>

        <a href="https://youtube.com" target="_blank" rel="noopener" class="platform-row">
          <div class="platform-info">
            <i data-lucide="youtube" class="platform-icon"></i>
            <span>YouTube Music</span>
          </div>
          <span class="btn btn-primary platform-btn">Watch</span>
        </a>

        <a href="https://bandcamp.com" target="_blank" rel="noopener" class="platform-row">
          <div class="platform-info">
            <i data-lucide="radio" class="platform-icon"></i>
            <span>Bandcamp</span>
          </div>
          <span class="btn btn-primary platform-btn">Buy</span>
        </a>

        <a href="https://amazon.com" target="_blank" rel="noopener" class="platform-row">
          <div class="platform-info">
            <i data-lucide="shopping-bag" class="platform-icon"></i>
            <span>Amazon Music</span>
          </div>
          <span class="btn btn-primary platform-btn">Stream</span>
        </a>
      </div>

      <footer class="smartlink-footer">
        <div class="social-links" style="margin-bottom: 1rem;">
          <a href="#" aria-label="Spotify"><i data-lucide="music"></i></a>
          <a href="#" aria-label="Instagram"><i data-lucide="instagram"></i></a>
          <a href="#" aria-label="YouTube"><i data-lucide="youtube"></i></a>
        </div>
        <p>&copy; 2026 Caliptra. Powered by Caliptra Smart Links.</p>
      </footer>
    </main>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) window.lucide.createIcons();
      });
    </script>
  </body>
</html>
